
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Entregas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0e1a;--bg2:#111827;--bg3:#1a2035;--bg4:#1e2640;
  --border:#2a3550;--border2:#3a4a6a;
  --text:#e8edf5;--text2:#8a9ab5;--text3:#5a6a85;
  --green:#22c55e;--green2:#16a34a;--green3:rgba(34,197,94,0.12);
  --blue:#3b82f6;--blue2:#2563eb;--blue3:rgba(59,130,246,0.12);
  --red:#ef4444;--red3:rgba(239,68,68,0.12);
  --orange:#f97316;--orange3:rgba(249,115,22,0.12);
  --gray:#6b7280;--purple:#a855f7;--purple3:rgba(168,85,247,0.12);
  --sidebar:220px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;font-size:14px}
.screen{display:none}.screen.active{display:flex}
.page{display:none}.page.active{display:block}

/* LOGIN */
#screen-login{min-height:100vh;align-items:center;justify-content:center;background:var(--bg)}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:380px}
.login-logo-wrap{display:flex;justify-content:center;margin-bottom:32px}
.login-logo-img{height:56px;max-width:200px;object-fit:contain}
.login-logo-slot{height:48px;width:160px;background:var(--bg3);border:1px dashed var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3)}
.login-title{font-size:22px;font-weight:600;text-align:center;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--blue)}
.btn-login{width:100%;background:var(--blue);color:#fff;border:none;border-radius:9px;padding:11px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:4px}
.btn-login:hover{background:var(--blue2)}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px}

/* APP SHELL */
#screen-app{flex-direction:row;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;min-height:64px}
.sidebar-logo img{max-height:40px;max-width:160px;object-fit:contain}
.sidebar-logo-slot{height:32px;width:100%;background:var(--bg3);border:1px dashed var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3)}
.sidebar-user{padding:12px 16px;border-bottom:1px solid var(--border)}
.sidebar-user-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-user-role{font-size:11px;color:var(--text3);margin-top:2px}
.sidebar-nav{flex:1;padding:10px 0}
.nav-section{margin-bottom:2px}
.nav-section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:8px 16px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;border-left:3px solid transparent;white-space:nowrap}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--blue);background:var(--blue3);border-left-color:var(--blue)}
.nav-item.orange.active{color:var(--orange);background:var(--orange3);border-left-color:var(--orange)}
.nav-sub-item{padding:7px 16px 7px 36px;font-size:12px}
.nav-item-icon{font-size:15px;opacity:.8;flex-shrink:0}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.btn-logout{width:100%;background:transparent;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:12px;color:var(--text3);cursor:pointer;font-family:inherit;transition:all .15s}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0}
.topbar-title{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-op-logo{height:28px;max-width:80px;object-fit:contain}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.admin-chip{background:var(--orange3);border:1px solid var(--orange);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--orange);font-weight:600}
.op-chip{background:var(--blue3);border:1px solid var(--blue);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--blue);font-weight:500}
.saving-ind{font-size:11px;color:var(--text3)}
.content{padding:24px;flex:1}

/* WIP */
.wip-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:360px;text-align:center;gap:14px}
.wip-icon{font-size:44px;opacity:.3}
.wip-title{font-size:18px;font-weight:600;color:var(--text2)}
.wip-sub{font-size:13px;color:var(--text3);max-width:360px;line-height:1.6}
.wip-badge{background:var(--orange3);border:1px solid var(--orange);border-radius:20px;padding:4px 14px;font-size:12px;color:var(--orange);font-weight:500}

/* DASH CARDS */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:border-color .15s,background .15s;position:relative;overflow:hidden}
.dash-card:hover{border-color:var(--border2);background:var(--bg3)}
.dash-card-icon{font-size:26px;margin-bottom:10px}
.dash-card-title{font-size:14px;font-weight:600;margin-bottom:4px}
.dash-card-sub{font-size:12px;color:var(--text3)}

/* BASE SELECTOR */
.base-selector{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.base-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.base-btn:hover{border-color:var(--blue);color:var(--blue)}
.base-btn.active{background:var(--blue3);border-color:var(--blue);color:var(--blue);font-weight:500}
.base-btn-add{border-style:dashed;color:var(--text3)}
.base-btn-add:hover{border-color:var(--green);color:var(--green)}

/* BLOCKS */
.blocks-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.block{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px}
.block-title{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.block-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.block-pct{font-size:38px;font-weight:600;line-height:1;margin-bottom:4px}
.block-sub{font-size:12px;color:var(--text2);margin-bottom:10px}
.bar-wrap{background:var(--bg3);border-radius:4px;height:5px;margin-bottom:10px}
.bar-fill{height:5px;border-radius:4px;transition:width .6s ease}
.mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.mini{background:var(--bg3);border-radius:8px;padding:8px;text-align:center}
.mini-val{font-size:14px;font-weight:600;line-height:1;margin-bottom:2px}
.mini-lbl{font-size:10px;color:var(--text3)}

/* CARDS */
.cards-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;position:relative;overflow:hidden}
.card-top{position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.card-lbl{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.card-val{font-size:22px;font-weight:600;line-height:1;margin-bottom:2px}
.card-pct{font-size:12px;color:var(--text2)}

/* CHART */
.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:18px}
.chart-box-title{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:12px}
.chart-h{position:relative;width:100%;height:190px}

/* TABLE */
.tbl-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:18px}
.tbl-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.tbl-head-title{font-size:13px;font-weight:500}
.tbl-search{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;width:170px}
.tbl-search:focus{border-color:var(--blue)}
table{width:100%;border-collapse:collapse}
th{padding:8px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:var(--text2)}
td{padding:8px 14px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500}
.bg{background:var(--green3);color:var(--green)}
.bb{background:var(--blue3);color:var(--blue)}
.br{background:var(--red3);color:var(--red)}
.bo{background:var(--orange3);color:var(--orange)}
.bgr{background:rgba(107,114,128,.15);color:var(--gray)}

/* IMPORT */
.import-bar{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.import-slot{flex:1;min-width:200px;background:var(--bg3);border:1px dashed var(--border2);border-radius:10px;padding:12px;cursor:pointer;transition:border-color .15s;position:relative}
.import-slot:hover{border-color:var(--blue)}
.import-slot input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.import-lbl{font-size:10px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em}
.import-name{font-size:13px;color:var(--text);font-weight:500;margin-bottom:2px}
.import-ok{font-size:11px;color:var(--green)}
.import-wait{font-size:11px;color:var(--text3)}

/* SNAP CONFIRM */
.snap-bar{background:var(--bg2);border:1px solid var(--green);border-radius:10px;padding:10px 16px;margin-bottom:14px;display:none;font-size:13px;color:var(--green)}

/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:8px}
.tl-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.tl-date{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;min-width:80px}
.tl-time{font-size:13px;font-weight:500;color:var(--blue);font-family:'DM Mono',monospace;min-width:44px}
.tl-metrics{display:flex;gap:14px;flex:1;flex-wrap:wrap}
.tl-m{text-align:center}
.tl-v{font-size:14px;font-weight:600;line-height:1}
.tl-l{font-size:10px;color:var(--text3);margin-top:2px}
.tl-d{font-size:11px;margin-top:1px}
.up{color:var(--green)}.dn{color:var(--red)}

/* ADMIN */
.create-form{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:18px}
.create-form-title{font-size:13px;font-weight:500;margin-bottom:12px;color:var(--text2)}
.create-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.create-group{flex:1;min-width:150px}
.create-label{font-size:11px;color:var(--text3);margin-bottom:4px;display:block}
.create-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.create-input:focus{border-color:var(--blue)}
.btn-create{background:var(--green2);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-create:hover{background:var(--green)}
.btn-create:disabled{opacity:.5;cursor:not-allowed}
.create-msg{font-size:12px;margin-top:8px;min-height:16px}
.create-msg.ok{color:var(--green)}.create-msg.err{color:var(--red)}

/* FILTER */
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.fsel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.fsel:focus{border-color:var(--blue)}
.btn-sm{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-sm:hover{border-color:var(--blue);color:var(--blue)}
.btn-primary-sm{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-primary-sm:hover{background:var(--blue2)}

/* LIBERACAO */
.lib-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:460px}
.lib-title{font-size:16px;font-weight:600;margin-bottom:4px}
.lib-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
.lib-row{display:flex;gap:12px;margin-bottom:18px}
.lib-btn{flex:1;padding:14px;border-radius:10px;border:2px solid transparent;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.lib-ok{background:var(--green3);color:var(--green);border-color:var(--green)}
.lib-nok{background:var(--red3);color:var(--red);border-color:var(--red)}
.lib-ok.sel{background:var(--green);color:#fff}
.lib-nok.sel{background:var(--red);color:#fff}
.lib-obs{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px;font-family:inherit;resize:vertical;min-height:72px;margin-bottom:12px;outline:none}
.lib-obs:focus{border-color:var(--blue)}

.empty{text-align:center;padding:28px;color:var(--text3);font-size:13px}

/* GITHUB STATUS */
.gh-badge{display:inline-flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--text3)}
.gh-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

@media(max-width:768px){
  .sidebar{display:none}
  .blocks-row{grid-template-columns:1fr}
  .mini-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="screen-login" style="display:flex">
  <div class="login-box">
    <div class="login-logo-wrap" id="login-logo-wrap">
      <div class="login-logo-slot" id="login-logo-slot">LOGO DA EMPRESA</div>
    </div>
    <div class="login-title">Bem-vindo</div>
    <div class="login-sub">Acesse sua conta para continuar</div>
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input class="form-input" type="email" id="login-email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input class="form-input" type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div class="screen" id="screen-app">
  <div class="sidebar">
    <div class="sidebar-logo" id="sidebar-logo">
      <div class="sidebar-logo-slot">LOGO</div>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-user-name" id="sb-name">—</div>
      <div class="sidebar-user-role" id="sb-role">—</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="doLogout()">Sair da conta</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <img id="topbar-op-logo" class="topbar-op-logo" style="display:none">
      </div>
      <div class="topbar-right">
        <span id="topbar-chip"></span>
        <span class="gh-badge" id="gh-badge" style="display:none"><span class="gh-dot" id="gh-dot"></span><span id="gh-txt">GitHub</span></span>
        <span class="saving-ind" id="saving-ind"></span>
      </div>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://alqefoqvkqdniggxhvcn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0eoNBHhuAWgzd2jGZT2jLA_vGIynjsr';
const ADMIN_EMAIL  = 'luiz.pires@parceirospot.com.br';
const GH_OWNER     = 'henriqueluis305-del';
const GH_REPO      = 'painel-entregas';
const GH_TOKEN     = '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';
const GH_BRANCH    = 'main';
const GH_RAW       = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}`;
const GH_API       = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}`;

const ALL_OPS = ['shopee','meli','jt','loggi','imile'];
const OP_LABELS = {shopee:'Shopee',meli:'Meli','jt':'J&T',loggi:'Loggi',imile:'Imile'};
const OP_ICONS  = {shopee:'🛍️',meli:'🟡','jt':'📦',loggi:'🚚',imile:'✈️'};

const STATUS_MAP = {
  'Delivered':'Entregue','Hub_Received':'Recebido','OnHold':'Ocorrência',
  'Hub_Assigned':'Sem atribuição','LMHub_LHTransported':'Faltante',
  'Delivering':'Em rota','Return_LMHub_LHTransporting':'Devolução em LH',
  'Hub_LHArrived':'Faltante','SOC_LHTransported':'Faltante','SOC_Packing':'Faltante',
  'SOC_Staging':'Faltante','Hub_Packing':'Faltante','SOC_LHArrived':'Faltante',
  'SOC_Packed':'Faltante','SOC_Received':'Faltante',
  'Return_Hub_Received':'Interceptado','Return_Hub_Packing':'Devolução'
};
const DEV_SET = new Set(['Devolução em LH','Interceptado','Devolução']);

// ============================================================
// STATE
// ============================================================
let currentUser  = null;
let currentToken = null;
let isAdmin      = false;
let userOp       = null;  // slug da operação do supervisor (ex: 'shopee')
let userBase     = null;  // base do supervisor (ex: 'xpt-adr-02')
let currentOp    = null;  // op ativa no admin
let currentBase  = null;  // base ativa
let csvData      = [];
let xlsxData     = [];
let logsData     = [];    // logs carregados do GitHub
let cepCache     = JSON.parse(localStorage.getItem('cep_cache')||'{}');
let sortStates   = {};
let libSel       = null;

// ============================================================
// GITHUB API
// ============================================================
async function ghGet(path) {
  try {
    const r = await fetch(`${GH_RAW}/${path}?t=${Date.now()}`);
    if (!r.ok) return null;
    return await r.text();
  } catch { return null; }
}

async function ghGetJSON(path) {
  const txt = await ghGet(path);
  if (!txt) return null;
  try { return JSON.parse(txt); } catch { return null; }
}

async function ghPut(path, content, message) {
  // Get current SHA if file exists
  let sha = null;
  try {
    const r = await fetch(`${GH_API}/contents/${path}`, {
      headers: { 'Authorization': `Bearer ${GH_TOKEN}`, 'Accept': 'application/vnd.github+json' }
    });
    if (r.ok) { const d = await r.json(); sha = d.sha; }
  } catch {}

  const body = { message, content: btoa(unescape(encodeURIComponent(content))), branch: GH_BRANCH };
  if (sha) body.sha = sha;

  const r = await fetch(`${GH_API}/contents/${path}`, {
    method: 'PUT',
    headers: {
      'Authorization': `Bearer ${GH_TOKEN}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  return r.ok;
}

async function ghListDir(path) {
  try {
    const r = await fetch(`${GH_API}/contents/${path}`, {
      headers: { 'Authorization': `Bearer ${GH_TOKEN}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!r.ok) return [];
    const items = await r.json();
    return Array.isArray(items) ? items : [];
  } catch { return []; }
}

async function supaReq(path, opts={}) {
  const res = await fetch(SUPABASE_URL+path, {
    ...opts,
    headers:{
      'apikey':SUPABASE_KEY,
      'Authorization':'Bearer '+(currentToken||SUPABASE_KEY),
      'Content-Type':'application/json',
      'Prefer':opts.prefer||'',
      ...(opts.headers||{})
    }
  });
  return res;
}
async function supaAuth(action, body) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/${action}`, {
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  return res.json();
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-err');
  const btn   = document.getElementById('btn-login');
  if (!email||!pass) { err.textContent='Preencha e-mail e senha.'; return; }
  btn.disabled=true; btn.textContent='Entrando...'; err.textContent='';
  try {
    const data = await supaAuth('token?grant_type=password', {email, password:pass});
    if (!data.access_token) {
      err.textContent = data.error_description || 'E-mail ou senha incorretos.';
      btn.disabled=false; btn.textContent='Entrar'; return;
    }
    currentToken = data.access_token;
    currentUser  = data.user;
    isAdmin      = email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
    if (!isAdmin) {
      try {
        const pr = await supaReq('/rest/v1/profiles?id=eq.'+currentUser.id);
        if (pr.ok) {
          const profiles = await pr.json();
          userOp   = profiles[0]?.operacao || ALL_OPS[0];
          userBase = profiles[0]?.base || null;
        }
      } catch { userOp = ALL_OPS[0]; }
    }
    btn.disabled=false; btn.textContent='Entrar';
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-login').classList.remove('active');
    document.getElementById('screen-app').style.display  = 'flex';
    document.getElementById('screen-app').classList.add('active');
    document.getElementById('sb-name').textContent = email.split('@')[0];
    document.getElementById('sb-role').textContent = isAdmin ? 'Administrador' : `Supervisor — ${OP_LABELS[userOp]||userOp}${userBase?' / '+userBase:''}`;
    const chip = document.getElementById('topbar-chip');
    if (isAdmin) { chip.className='admin-chip'; chip.textContent='ADMIN'; }
    else { chip.className='op-chip'; chip.textContent=OP_LABELS[userOp]||userOp; }
    buildSidebar();
    navigateTo(isAdmin ? 'admin-home' : 'sup-home');
  } catch(e) {
    err.textContent = 'Erro de conexão. Tente novamente.';
    btn.disabled=false; btn.textContent='Entrar';
    console.error(e);
  }
}

async function doLogout() {
  try { await supaReq('/auth/v1/logout',{method:'POST'}); } catch {}
  currentUser=null; currentToken=null; isAdmin=false; userOp=null; userBase=null;
  csvData=[]; xlsxData=[]; logsData=[];

}

// GITHUB LOGS
// ============================================================
function logPath(op, base) {
  const safeBase = base.toLowerCase().replace(/[^a-z0-9]/g,'-');
  return `${op}/${safeBase}/logs.json`;
}

async function loadLogs(op, base) {
  setSaving('Carregando histórico...');
  const data = await ghGetJSON(logPath(op, base));
  logsData = Array.isArray(data) ? data : [];
  setSaving('');
  setGhStatus(true, 'GitHub OK');
  return logsData;
}

async function saveSnapshot(op, base) {
  const s = calcSLA(); const d = calcDS();
  const now  = new Date();
  const snap = {
    data:      now.toLocaleDateString('pt-BR'),
    hora:      now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    ts:        now.toISOString(),
    sla_pct:   parseFloat(s.pct.toFixed(2)),
    ds_pct:    parseFloat(d.pct.toFixed(2)),
    total:     s.total,
    entregues: s.entregues,
    em_rota:   s.emRota,
    ocorrencias: s.ocorr,
    faltantes: s.faltante,
    devolvidos: s.dev,
    motoristas: xlsxData
  };

  // Load existing logs first
  setSaving('Salvando no GitHub...');
  setGhStatus(null, 'Salvando...');
  const existing = await ghGetJSON(logPath(op, base)) || [];
  existing.push(snap);
  const ok = await ghPut(
    logPath(op, base),
    JSON.stringify(existing, null, 2),
    `snapshot ${op}/${base} — ${snap.data} ${snap.hora}`
  );
  if (ok) {
    logsData = existing;
    setSaving('');
    setGhStatus(true, 'Salvo ✓');
    showSnack(`Snapshot salvo — SLA: ${s.pct.toFixed(1)}% | DS: ${d.pct.toFixed(1)}%`);
    renderHistoricoFromLogs();
    updateCharts();
  } else {
    setSaving('');
    setGhStatus(false, 'Erro ao salvar');
    showSnack('Erro ao salvar no GitHub. Verifique o token.', true);
  }
}

function pageTitle(p) {
  const t = {
    'admin-home':'Dashboard','admin-financeiro':'Financeiro',
    'admin-pessoas':'Gestão de Pessoas','admin-users':'Usuários',
    'sup-home':'Dashboard','sup-hoje':'SLA & DS — Hoje',
    'sup-historico':'Histórico','sup-pnr':'PNRs',
    'sup-motoristas':'Motoristas','sup-liberacao':'Liberação de Pagamento',
    'sup-problema':'Relatar Problema'
  };
  if (p.startsWith('admin-op-')) return `Operação — ${OP_LABELS[p.replace('admin-op-','')] || p.replace('admin-op-','')}`;
  if (p.startsWith('admin-base-')) { const [,op,base]=p.split('-base-'); return `${OP_LABELS[op]||op} / ${base}`; }
  return t[p]||p;
}

async function afterRender(page) {

  if (page==='sup-motoristas'){ renderSLATable(); renderDSTables(); }
  if (page==='admin-users')   { loadAdminClients(); }
  if (page.startsWith('admin-op-')) {
    currentOp = page.replace('admin-op-','');
    currentBase = null;
    loadOpLogo(currentOp);
    await loadBasesForOp(currentOp);
  }
}

// ============================================================
async function loadBasesForOp(op) {
  const items = await ghListDir(op);
  const bases = items.filter(i=>i.type==='dir').map(i=>i.name);
  const container = document.getElementById('base-list');
  if (!container) return;
  if (!bases.length) {
    container.innerHTML = `<div class="empty">Nenhuma base encontrada em /${op}/.<br>Crie a pasta no GitHub para começar.</div>`;
    return;
  }
  container.innerHTML = bases.map(b=>`
    <button class="base-btn" onclick="selectBase('${op}','${b}',this)">${b.toUpperCase()}</button>
  `).join('') + `<button class="base-btn base-btn-add" onclick="promptNewBase('${op}')">+ Nova base</button>`;
}

async function selectBase(op, base, el) {
  currentBase = base;
  document.querySelectorAll('.base-btn').forEach(b=>b.classList.remove('active'));
  if (el) el.classList.add('active');
  await loadLogs(op, base);
  const panel = document.getElementById('base-panel');
  if (!panel) return;
  panel.innerHTML = basePanelHTML(op, base);
  updateAll();
}

async function promptNewBase(op) {
  const name = prompt('Nome da nova base (ex: XPT-ADR-02):');
  if (!name) return;
  const slug = name.toLowerCase().replace(/[^a-z0-9]/g,'-');
  setSaving('Criando pasta no GitHub...');
  const ok = await ghPut(`${op}/${slug}/.gitkeep`, '', `criar base ${op}/${slug}`);
  setSaving('');
  if (ok) { showSnack(`Base ${name} criada!`); await loadBasesForOp(op); }
  else showSnack('Erro ao criar base.', true);
}

async function loadLogsForCurrentUser() {
  if (!userOp || !userBase) { logsData=[]; return; }
  await loadLogs(userOp, userBase);
}

async function loadCSV(event) {
  const file=event.target.files[0]; if(!file) return;
  document.getElementById('csvName').textContent=file.name;
  document.getElementById('csvStatus').textContent='Processando...';
  const text=await file.text();
  const latest={};
  text.split('\n').filter(l=>l.trim()).slice(1).forEach(row=>{
    const cols=parseCSVRow(row);
    if(cols.length<23) return;
    const codigo=cols[0]?.trim(); if(!codigo) return;
    latest[codigo]={codigo,cep:cols[6]?.trim(),tel:cols[12]?.trim(),driver:cols[13]?.trim(),status:cols[22]?.trim()};
  });
  csvData=Object.values(latest);
  document.getElementById('csvStatus').textContent='✓ '+csvData.length+' pacotes';
  document.getElementById('csvStatus').className='import-ok';
  await resolveAllCEPs();
  updateAll();
}

async function loadXLSX(event) {
  const file=event.target.files[0]; if(!file) return;
  document.getElementById('xlsxName').textContent=file.name;
  document.getElementById('xlsxStatus').textContent='Processando...';
  const ab=await file.arrayBuffer();
  const wb=XLSX.read(ab,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1});
  xlsxData=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; if(!r||!r[0]) continue;
    xlsxData.push({driver:String(r[0]||'').trim(),saiu:Number(r[5])||0,entregues:Number(r[8])||0,emRota:Number(r[10])||0,ocorrencias:Number(r[12])||0});
  }
  document.getElementById('xlsxStatus').textContent='✓ '+xlsxData.length+' motoristas';
  document.getElementById('xlsxStatus').className='import-ok';
  updateAll();
}

function parseCSVRow(row){
  const res=[]; let cur='',inQ=false;
  for(const c of row){if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){res.push(cur);cur='';}else{cur+=c;}}
  res.push(cur); return res;
}

async function resolveAllCEPs(){
  const ceps=[...new Set(csvData.map(p=>p.cep).filter(c=>c&&c.length>=8))];
  for(const cep of ceps.filter(c=>!cepCache[c]).slice(0,150)){
    try{
      const d=await(await fetch('https://viacep.com.br/ws/'+cep.replace(/\D/g,'')+'/json/')).json();
      cepCache[cep]=d.erro?{cidade:'Desconhecido',bairro:'Desconhecido'}:{cidade:d.localidade||'',bairro:d.bairro||''};
    }catch{cepCache[cep]={cidade:'Desconhecido',bairro:'Desconhecido'};}
  }
  localStorage.setItem('cep_cache',JSON.stringify(cepCache));
}

// CALCS
// ============================================================
function calcSLA(){
  const total=csvData.length;
  const entregues=csvData.filter(p=>STATUS_MAP[p.status]==='Entregue').length;
  const emRota=csvData.filter(p=>STATUS_MAP[p.status]==='Em rota').length;
  const ocorr=csvData.filter(p=>STATUS_MAP[p.status]==='Ocorrência').length;
  const faltante=csvData.filter(p=>STATUS_MAP[p.status]==='Faltante').length;
  const dev=csvData.filter(p=>DEV_SET.has(STATUS_MAP[p.status])).length;
  const outros=total-entregues-emRota-ocorr-faltante-dev;
  return{total,entregues,emRota,ocorr,faltante,dev,outros,pct:total>0?(entregues/total*100):0};
}
function calcDS(){
  const totalSaiu=xlsxData.reduce((a,d)=>a+d.saiu,0);
  const totalE=xlsxData.reduce((a,d)=>a+d.entregues,0);
  const totalR=xlsxData.reduce((a,d)=>a+d.emRota,0);
  const totalO=xlsxData.reduce((a,d)=>a+d.ocorrencias,0);
  return{totalSaiu,totalE,totalR,totalO,motoristas:xlsxData.length,pct:totalSaiu>0?(totalE/totalSaiu*100):0};
}
function pctBadge(p){
  const v=parseFloat(p);
  return `<span class="badge ${v>=85?'bg':v>=70?'bb':'br'}">${v.toFixed(1)}%</span>`;
}

function set(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}

function updateAll(){
  const s=calcSLA(); const d=calcDS();
  set('g-sla-pct',s.pct.toFixed(1)+'%'); set('g-sla-sub',s.total+' pacotes');
  const bar=document.getElementById('g-sla-bar');if(bar)bar.style.width=Math.min(s.pct,100)+'%';
  set('g-e',s.entregues);set('g-r',s.emRota);set('g-o',s.ocorr);
  set('g-f',s.faltante);set('g-d',s.dev);set('g-x',s.outros);
  set('g-ds-pct',d.pct.toFixed(1)+'%');set('g-ds-sub',d.motoristas+' motoristas');
  const bds=document.getElementById('g-ds-bar');if(bds)bds.style.width=Math.min(d.pct,100)+'%';
  set('g-ds-e',d.totalE);set('g-ds-r',d.totalR);set('g-ds-o',d.totalO);
  // motoristas cards
  set('sla-pct',s.pct.toFixed(1)+'%');set('sla-tot',s.total+' pacotes');
  const pt=v=>s.total>0?(v/s.total*100).toFixed(1)+'%':'0%';
  set('sc-e',s.entregues);set('sp-e',pt(s.entregues));
  set('sc-r',s.emRota);set('sp-r',pt(s.emRota));
  set('sc-o',s.ocorr);set('sp-o',pt(s.ocorr));
  set('sc-f',s.faltante);set('sp-f',pt(s.faltante));
  set('sc-d',s.dev);set('sp-d',pt(s.dev));
  renderDSTables(); renderSLATable(); updateCharts();
}

function renderDSTables(){
  ['gtbody','ds-tbody'].forEach(id=>{
    const tbody=document.getElementById(id);if(!tbody)return;
    if(!xlsxData.length){tbody.innerHTML='<tr><td colspan="6" class="empty">Importe a base DS (.xlsx)</td></tr>';return;}
    tbody.innerHTML=xlsxData.map(d=>{
      const dp=d.saiu>0?(d.entregues/d.saiu*100):0;
      return `<tr><td>${d.driver}</td><td>${d.saiu}</td><td>${d.entregues}</td><td>${d.emRota}</td><td>${d.ocorrencias}</td><td>${pctBadge(dp)}</td></tr>`;
    }).join('');
  });
}

function renderSLATable(){
  const tbody=document.getElementById('sla-tbody');if(!tbody)return;
  if(!csvData.length){tbody.innerHTML='<tr><td colspan="7" class="empty">Importe a base SLA (.csv)</td></tr>';return;}
  const dm={};
  csvData.forEach(p=>{
    const n=p.driver||'Desconhecido';
    if(!dm[n])dm[n]={total:0,e:0,r:0,o:0,f:0};
    const ms=STATUS_MAP[p.status]||p.status;
    dm[n].total++;
    if(ms==='Entregue')dm[n].e++;
    else if(ms==='Em rota')dm[n].r++;
    else if(ms==='Ocorrência')dm[n].o++;
    else if(ms==='Faltante')dm[n].f++;
  });
  tbody.innerHTML=Object.entries(dm).map(([n,d])=>{
    const sp=d.total>0?(d.e/d.total*100):0;
    return `<tr><td>${n}</td><td>${d.total}</td><td>${d.e}</td><td>${d.r}</td><td>${d.o}</td><td>${d.f}</td><td>${pctBadge(sp)}</td></tr>`;
  }).join('');
}

function renderHistoricoFromLogs(){
  const el=document.getElementById('historico-tl');if(!el)return;
  if(!logsData.length){el.innerHTML='<div class="empty">Nenhum snapshot registrado ainda.</div>';return;}
  el.innerHTML=[...logsData].reverse().map((s,i,arr)=>{
    const prev=arr[i+1];
    const sd=prev?(s.sla_pct-prev.sla_pct).toFixed(1):null;
    const dd=prev?(s.ds_pct-prev.ds_pct).toFixed(1):null;
    const dt=v=>v===null?'':(`<div class="tl-d ${parseFloat(v)>=0?'up':'dn'}">${parseFloat(v)>=0?'▲':'▼'} ${Math.abs(v)}%</div>`);
    return `<div class="tl-item">

      <div class="tl-time">${s.hora||''}</div>
      <div class="tl-metrics">

        <div class="tl-m"><div class="tl-v" style="color:var(--green)">${s.ds_pct.toFixed(1)}%</div><div class="tl-l">DS</div>${dt(dd)}</div>
        <div class="tl-m"><div class="tl-v">${s.total}</div><div class="tl-l">Pacotes</div></div>
        <div class="tl-m"><div class="tl-v">${s.entregues}</div><div class="tl-l">Entregues</div></div>

}

async function createUser(){
  const email  =document.getElementById('new-email').value.trim();
  const pass   =document.getElementById('new-pass').value;
  const empresa=document.getElementById('new-empresa').value.trim();
  const op     =document.getElementById('new-op').value;
  const base   =document.getElementById('new-base').value.trim().toLowerCase().replace(/[^a-z0-9]/g,'-');
  const msg    =document.getElementById('create-msg');
  const btn    =document.getElementById('btn-create-user');
  if(!email||!pass||!empresa){msg.textContent='Preencha todos os campos.';msg.className='create-msg err';return;}
  if(pass.length<6){msg.textContent='Senha mínima: 6 caracteres.';msg.className='create-msg err';return;}
  btn.disabled=true;msg.textContent='Criando...';msg.className='create-msg';
  const r=await fetch(`${SUPABASE_URL}/auth/v1/admin/users`,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({email,password:pass,email_confirm:true,user_metadata:{empresa}})
  });
  const data=await r.json();
  if(data.id){
    await supaReq('/rest/v1/profiles',{method:'POST',prefer:'return=minimal',
      body:JSON.stringify({id:data.id,email,empresa,role:'cliente',operacao:op,base})
    });
    // Criar pasta da base no GitHub se não existir
    if(base){
      await ghPut(`${op}/${base}/.gitkeep`,'',`criar base ${op}/${base} para ${email}`);
    }
    msg.textContent=`✓ Acesso criado — ${OP_LABELS[op]} / ${base||'sem base'}`;msg.className='create-msg ok';
    document.getElementById('new-email').value='';
    document.getElementById('new-pass').value='';
    document.getElementById('new-empresa').value='';
    document.getElementById('new-base').value='';
    loadAdminClients();
  } else {
    msg.textContent=data.msg||data.message||'Erro ao criar usuário.';msg.className='create-msg err';
  }
  btn.disabled=false;
}

  if(!pr.ok){tbody.innerHTML='<tr><td colspan="4" class="empty">Erro ao carregar.</td></tr>';return;}
  const profiles=await pr.json();
  if(!profiles.length){tbody.innerHTML='<tr><td colspan="4" class="empty">Nenhum usuário cadastrado.</td></tr>';return;}
  tbody.innerHTML=profiles.map(p=>`
    <tr>
      <td style="font-weight:500">${p.empresa||'—'}</td>
      <td style="color:var(--text2)">${p.email}</td>
      <td><span class="badge bb">${OP_LABELS[p.operacao]||p.operacao||'—'}</span></td>
      <td style="color:var(--text3)">${p.base||'—'}</td>
    </tr>`).join('');
}

// ============================================================
// TABLE HELPERS
// ============================================================
function filterTbl(v,id){
  Array.from(document.getElementById(id)?.rows||[]).forEach(r=>{
    r.style.display=r.cells[0]?.textContent?.toLowerCase().includes(v.toLowerCase())?'':'none';
  });
}
function sortTbl(id,col){
  const tbody=document.getElementById(id);if(!tbody)return;
  const key=id+'_'+col;const asc=!sortStates[key];sortStates[key]=asc;
  const rows=Array.from(tbody.rows);
  rows.sort((a,b)=>{
    const av=a.cells[col]?.textContent?.trim()||'';
    const bv=b.cells[col]?.textContent?.trim()||'';
    const an=parseFloat(av);const bn=parseFloat(bv);
    if(!isNaN(an)&&!isNaN(bn))return asc?an-bn:bn-an;
    return asc?av.localeCompare(bv):bv.localeCompare(av);
  });
  rows.forEach(r=>tbody.appendChild(r));
}

// ============================================================
// UI HELPERS
// ============================================================
function setSaving(t){const el=document.getElementById('saving-ind');if(el)el.textContent=t;}
function showSnack(msg,err=false){
  let el=document.getElementById('snackbar');
  if(!el){el=document.createElement('div');el.id='snackbar';el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;z-index:9999;display:none;font-family:inherit';document.body.appendChild(el);}
  el.style.background=err?'#ef4444':'#22c55e';
  el.style.color='#fff';
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',4000);
}

loadCompanyLogo();
